# cargo-deny configuration — run with `cargo deny check advisories`.
#
# Every ignore below is a tracked exception, not a dismissal. When an entry's
# upstream fix lands, remove it so CI starts enforcing again.

[advisories]
ignore = [
    # rsa Marvin timing side-channel — no fixed release exists. Pulled in
    # transitively by ssh-commander-core 0.2.2 → russh 0.61 → ssh-key → rsa
    # for RSA key support (the russh 0.43 → 0.61 upgrade fixed the previous
    # RUSTSEC-2026-0153/0154 russh advisories but surfaces this one). Low
    # practical risk for an interactive SSH client.
    # TRACKED: drop when the rsa crate ships a constant-time fix.
    { id = "RUSTSEC-2023-0071", reason = "no fix available; transitive via russh 0.61 / ssh-key" },

    # Unmaintained / unsound (not exploitable here). All transitive via
    # ssh-commander-core; revisit when its dependency tree is next overhauled.
    { id = "RUSTSEC-2026-0097", reason = "rand unsoundness in a custom-logger edge case — transitive via russh 0.61" },
    { id = "RUSTSEC-2025-0052", reason = "async-std discontinued — transitive via ssh-commander-core/suppaftp" },
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x unmaintained but feature-complete — transitive" },
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained — transitive proc-macro, build-time only" },
]
